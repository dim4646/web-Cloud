<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit your site — WebCloud</title>
<link href="https://unpkg.com/grapesjs/dist/css/grapes.min.css" rel="stylesheet">
<link href="https://unpkg.com/grapesjs-preset-webpage/dist/grapesjs-preset-webpage.min.css" rel="stylesheet">
<style>
  :root{
    --navy:#0B1220;
    --paper:#F6F8FB;
    --white:#FFFFFF;
    --ink:#0B1220;
    --muted:#5A6478;
    --accent:#3DDC97;
    --accent-dim:#1F8F63;
    --line: rgba(11,18,32,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--ink);}
  #wc-topbar{
    height:56px;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;background:var(--navy);color:var(--white);
  }
  #wc-topbar .wc-brand{font-weight:700;font-size:.95rem;}
  #wc-topbar .wc-actions{display:flex;align-items:center;gap:10px;}
  #wc-topbar button{
    border:none;border-radius:8px;padding:9px 16px;font:600 .85rem/1 'Inter',sans-serif;
    cursor:pointer;
  }
  #wc-save-btn{background:var(--accent);color:var(--navy);}
  #wc-save-btn:disabled{opacity:.5;cursor:not-allowed;}
  #wc-close-btn{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.3) !important;}
  #wc-photo-btn{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.3) !important;}
  #wc-photo-btn:disabled{opacity:.5;cursor:not-allowed;}
  #wc-status{font-size:.8rem;color:rgba(255,255,255,.7);margin-right:6px;}
  #gjs{height:calc(100vh - 56px);}
  #wc-loading, #wc-error{
    position:fixed;inset:0;top:56px;display:flex;align-items:center;justify-content:center;
    background:var(--paper);font-size:.95rem;color:var(--muted);text-align:center;padding:20px;
  }
  #wc-error{display:none;color:#c0392b;}
</style>
</head>
<body>

<div id="wc-topbar">
  <div class="wc-brand">✏️ Edit your site</div>
  <div class="wc-actions">
    <span id="wc-status"></span>
    <button id="wc-photo-btn" type="button">📷 Add photo</button>
    <button id="wc-close-btn" type="button">Close</button>
    <button id="wc-save-btn" type="button">Save changes</button>
  </div>
</div>

<div id="wc-loading">Loading your site…</div>
<div id="wc-error"></div>
<div id="gjs" style="display:none;"></div>

<script src="https://unpkg.com/grapesjs"></script>
<script src="https://unpkg.com/grapesjs-preset-webpage"></script>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var loadingEl = document.getElementById('wc-loading');
  var errorEl = document.getElementById('wc-error');
  var gjsEl = document.getElementById('gjs');
  var statusEl = document.getElementById('wc-status');
  var saveBtn = document.getElementById('wc-save-btn');
  var closeBtn = document.getElementById('wc-close-btn');

  function showError(msg){
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    errorEl.textContent = msg;
  }

  if (!sessionId) {
    showError('Missing session — please open this page from your draft preview link.');
    return;
  }

  closeBtn.addEventListener('click', function(){
    window.location.href = '/.netlify/functions/preview-draft?session_id=' + encodeURIComponent(sessionId);
  });

  fetch('/.netlify/functions/get-draft?session_id=' + encodeURIComponent(sessionId))
    .then(function(res){
      if (!res.ok) throw new Error(res.status === 404 ? 'Your draft isn\'t ready yet.' : 'Failed to load your site.');
      return res.json();
    })
    .then(function(data){
      loadingEl.style.display = 'none';
      gjsEl.style.display = 'block';

      var editor = grapesjs.init({
        container: '#gjs',
        height: 'calc(100vh - 56px)',
        fromElement: false,
        storageManager: false,
        plugins: ['grapesjs-preset-webpage'],
        pluginsOpts: {
          'grapesjs-preset-webpage': {}
        },
      });

      editor.setComponents(data.html);

      // Photo slots are empty <div data-wc-photo="N"> containers with no
      // visible cue - highlight them directly in the canvas iframe so the
      // customer can see where photos go. Injected straight into the canvas
      // document (not via GrapesJS's CssComposer), so it's purely visual for
      // editing and never ends up in editor.getCss()/getHtml() on save.
      var canvasDoc = editor.Canvas.getDocument();
      var hintStyle = canvasDoc.createElement('style');
      hintStyle.textContent = '[data-wc-photo]{outline:2px dashed #3DDC97 !important;outline-offset:-2px;position:relative;cursor:pointer;}' +
        '[data-wc-photo]::after{content:"📷 Click, then use \'Add photo\' above";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font:600 12px/1.3 sans-serif;color:#0B1220;background:rgba(61,220,151,.35);pointer-events:none;}' +
        '[data-wc-photo]:has(img)::after{content:none;}' +
        '[data-wc-photo]:has(img){outline:2px dashed transparent !important;}';
      canvasDoc.head.appendChild(hintStyle);

      var photoBtn = document.getElementById('wc-photo-btn');
      var photoInput = document.createElement('input');
      photoInput.type = 'file';
      photoInput.accept = 'image/*';
      photoInput.style.display = 'none';
      document.body.appendChild(photoInput);

      photoBtn.addEventListener('click', function(){ photoInput.click(); });

      photoInput.addEventListener('change', function(){
        var file = photoInput.files && photoInput.files[0];
        photoInput.value = '';
        if (!file) return;

        photoBtn.disabled = true;
        photoBtn.textContent = 'Uploading…';

        var reader = new FileReader();
        reader.onload = function(){
          var result = String(reader.result || '');
          var m = /^data:(.+);base64,(.*)$/.exec(result);
          if (!m) {
            photoBtn.disabled = false;
            photoBtn.textContent = '📷 Add photo';
            return;
          }
          fetch('/.netlify/functions/visual-upload-photo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sessionId: sessionId,
              contentType: m[1],
              base64: m[2],
              filename: file.name || 'photo.jpg',
            }),
          }).then(function(res){
            if (!res.ok) throw new Error('upload failed');
            return res.json();
          }).then(function(data){
            var selected = editor.getSelected();
            var slotId = selected && selected.getAttributes && selected.getAttributes()['data-wc-photo'];
            if (slotId) {
              // Photo-slot div: fill it with an <img>, same as how the
              // draft looks once a photo is set via the older upload path.
              selected.components('<img src="' + data.url + '" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block;">');
            } else if (selected && selected.get('type') === 'image') {
              selected.addAttributes({ src: data.url });
            } else {
              editor.getWrapper().append('<img src="' + data.url + '" style="max-width:100%;">');
            }
            statusEl.textContent = 'Photo added!';
          }).catch(function(){
            statusEl.textContent = 'Photo upload failed — try again.';
          }).finally(function(){
            photoBtn.disabled = false;
            photoBtn.textContent = '📷 Add photo';
          });
        };
        reader.readAsDataURL(file);
      });

      saveBtn.addEventListener('click', function(){
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        statusEl.textContent = '';

        var fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
          + '<style>' + editor.getCss() + '</style></head><body>'
          + editor.getHtml() + '</body></html>';

        fetch('/.netlify/functions/visual-edit-save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sessionId, html: fullHtml }),
        }).then(function(res){
          if (!res.ok) throw new Error('save failed');
          return res.json();
        }).then(function(){
          statusEl.textContent = 'Saved!';
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        }).catch(function(){
          statusEl.textContent = 'Something went wrong — try again.';
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save changes';
        });
      });
    })
    .catch(function(err){
      showError(err.message || 'Something went wrong loading your site.');
    });
})();
</script>
</body>
</html>
