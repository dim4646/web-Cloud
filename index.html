<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebCloud Solutions — Back soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1220;
    --accent:#3DDC97;
    --sky:#4C8DFF;
    --paper:#F6F8FB;
    --muted:#8A94A6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--navy);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
  }
  .wrap{max-width:520px;}
  .logo{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.3rem;
    margin-bottom:32px;
  }
  .logo span{color:var(--accent);}
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:clamp(1.6rem,4vw,2.2rem);
    margin-bottom:16px;
  }
  p{
    color:var(--muted);
    font-size:1.05rem;
    line-height:1.6;
    margin-bottom:28px;
  }
  a{
    color:var(--accent);
    font-weight:600;
    text-decoration:none;
  }
  a:hover{color:var(--sky);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Web<span>Cloud</span> Solutions</div>
    <h1>We'll be back shortly</h1>
    <p>We're doing some quick maintenance on the site. Thanks for your patience — check back soon.</p>
    <p>Need to reach us in the meantime? <a href="mailto:info@webcloudsolutions.com.au">info@webcloudsolutions.com.au</a></p>
  </div>
</body>
</html>
